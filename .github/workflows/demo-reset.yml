name: Demo Database Reset

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    if: vars.DEMO_MODE == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reset demo database
        run: npx tsx scripts/demo/reset-database.ts
        env:
          DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
